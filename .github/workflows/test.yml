name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        # macOS uses methods._stub.py (no pycaw / no LHM / no wpctl).
        # Tests target the platform-agnostic codepath; this job mainly
        # verifies _stub stays import-clean and macOS-Devs aren't
        # surprised by a regression.
        exclude:
          # macos-latest only ships modern Pythons via setup-python;
          # narrowing the matrix avoids unnecessary runners.
          - os: macos-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.11'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify clean import (no DeprecationWarnings)
        run: |
          PYTHONPATH=src python -W error::DeprecationWarning -c "import app, probe, methods; print('imports clean')"
