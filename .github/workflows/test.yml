name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-commit:
    name: pre-commit (lint + style)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run pre-commit hooks
        # Faengt Stilfehler ab (whitespace, EOL, YAML/TOML-syntax,
        # ruff-Lite-Linting) — verhindert dass jemand ohne lokales
        # 'pre-commit install' das Repo verschmutzt.
        uses: pre-commit/action@v3.0.1

  shell-lint:
    name: shellcheck + PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (sh + bash scripts)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
      - name: PSScriptAnalyzer (PowerShell scripts)
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          # Severity: nur Error. Warnings sind oft Style-Empfehlungen
          # (z.B. PSAvoidUsingWriteHost) die fuer interaktive Smoke-
          # Test-Skripte irrelevant sind — der OUTPUT soll direkt zum
          # Terminal gehen, nicht in die Pipeline.
          $issues = Invoke-ScriptAnalyzer -Path scripts/ -Recurse -Severity Error
          if ($issues) {
            $issues | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($issues.Count) error(s)"
            exit 1
          }

  pytest:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        # Per-OS notes:
        # - ubuntu-latest: production target. Full unit-test suite.
        # - macos-latest:  Thomas' dev environment. Uses methods._stub.py
        #                  (no pycaw / no LHM / no wpctl).
        # - windows-latest: production target. Loads methods._win32.py
        #                  but pycaw/LHM/pythonnet need real audio +
        #                  admin rights, so this job mainly verifies
        #                  that _win32.py stays import-clean and the
        #                  unit-test suite passes against the Windows
        #                  Python build.
        exclude:
          # macos-latest + windows-latest only ship modern Pythons via
          # setup-python; narrow the matrix to avoid runner-minute
          # waste on legacy versions.
          - os: macos-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.11'
          - os: windows-latest
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        # Coverage nur auf einem Slot (ubuntu/3.13) — sonst wird
        # CI-Zeit pro Matrix-Eintrag verschwendet ohne dass die
        # Coverage-Zahl sich aendert. testpaths/addopts/pythonpath
        # kommen aus pyproject.toml.
        if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13') }}
        run: pytest

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Verify clean import (no DeprecationWarnings)
        # 'shell: bash' macht den step plattform-uebergreifend laufbar
        # (Windows-Runner haben Git Bash; Default-Shell dort ist
        # PowerShell, das 'PYTHONPATH=src python ...' nicht versteht).
        shell: bash
        run: |
          PYTHONPATH=src python -W error::DeprecationWarning -c "import app, probe, methods; print('imports clean')"

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

  integration:
    name: integration tests (real Mosquitto)
    runs-on: ubuntu-latest
    needs: pytest
    timeout-minutes: 10

    # NOTE: macOS-Integration-Slot ist NICHT aktiv. Bei einem Versuch
    # connectet der Probe-Subprocess nicht zum Auto-Broker (Tests
    # erroren in der running_probe-fixture nach jeweils ~70s).
    # Auto-Broker startet OK, aber paho-mqtt's connect() haengt 60s+
    # — vermutlich GHA-macOS-Sandbox + IPv6/loopback-Quirks. Linux
    # deckt das production-Target ab, macOS-Verifikation passiert
    # auf Thomas' Dev-Machine vor jedem Push.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Mosquitto on PATH
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mosquitto mosquitto-clients
          sudo systemctl stop mosquitto || true
          sudo systemctl disable mosquitto || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        # The auto-broker fixture spawns mosquitto for the session
        # automatically — no separate "Start broker" step needed.
        run: pytest -m integration -v
