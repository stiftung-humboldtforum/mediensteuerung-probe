name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        # macOS uses methods._stub.py (no pycaw / no LHM / no wpctl).
        # Tests target the platform-agnostic codepath; this job mainly
        # verifies _stub stays import-clean and macOS-Devs aren't
        # surprised by a regression.
        exclude:
          # macos-latest only ships modern Pythons via setup-python;
          # narrowing the matrix avoids unnecessary runners.
          - os: macos-latest
            python-version: '3.9'
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.11'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        # testpaths/addopts/pythonpath kommen aus pyproject.toml,
        # ebenso die [tool.coverage.*] Konfiguration.
        run: pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Verify clean import (no DeprecationWarnings)
        run: |
          PYTHONPATH=src python -W error::DeprecationWarning -c "import app, probe, methods; print('imports clean')"

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

  integration:
    name: integration tests (real Mosquitto)
    runs-on: ubuntu-latest
    needs: pytest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Mosquitto
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mosquitto mosquitto-clients
          # Disable the default systemd-managed instance so it doesn't
          # bind 1883 and conflict with our test config.
          sudo systemctl stop mosquitto || true
          sudo systemctl disable mosquitto || true

      - name: Start test broker
        run: |
          # CI nutzt eine inline-config statt mosquitto/test.conf damit
          # der listener-port klar ist (config-file-port + -p arg
          # interagieren je nach mosquitto-Version unterschiedlich).
          cat > /tmp/test-broker.conf <<'EOF'
          listener 11883
          allow_anonymous true
          persistence false
          EOF
          mosquitto -c /tmp/test-broker.conf -d
          # Wait until it accepts connections
          for i in $(seq 1 30); do
            if mosquitto_sub -h 127.0.0.1 -p 11883 -t '$SYS/broker/version' -W 1 -C 1 2>/dev/null; then
              echo "broker is up"
              exit 0
            fi
            sleep 1
          done
          echo "broker did not come up in 30s" >&2
          exit 1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          PROBE_TEST_BROKER: 127.0.0.1
          PROBE_TEST_PORT: 11883
        run: pytest -m integration -v
