# Mosquitto config fuer Integration-Tests.
#
# Anonymous + plaintext — KEIN Production-Setup. Nur lokal/CI hinter
# einem Test-Network erreichbar (siehe docker-compose.test.yml und
# das GitHub-Actions service-container Setup).

listener 1883
allow_anonymous true

# Persistence aus — Tests starten mit clean state.
persistence false

# Etwas mehr logging fuer Debug-Sessions, in CI per Env reduzierbar.
log_type all
log_dest stdout
