# Linux-Test-Setup auf macOS-Dev — laeuft Probe-Tests in einem
# Linux-Container. Ergaenzt das auf-macOS-direkt-laufen via _stub.py
# durch eine echte Linux-Verifikation.
#
# Usage:
#   docker compose -f docker-compose.linux-test.yml run --rm probe-test
#   docker compose -f docker-compose.linux-test.yml run --rm probe-test pytest -m integration
#   docker compose -f docker-compose.linux-test.yml run --rm probe-test bash
#
# Was es verifiziert:
#   - Probe-Code laeuft auf echtem Linux-Python (nicht macOS via _stub)
#   - methods._linux.py importiert sauber
#   - paho-mqtt v2 funktioniert auf Linux
#   - Integration-Tests gegen einen Linux-Mosquitto laufen durch
#
# Was es nicht kann (braucht echte VM):
#   - PipeWire / wpctl mute-toggle (kein Audio-Daemon im Container)
#   - xrandr (kein X-Server)
#   - LibreHardwareMonitor (Windows + Admin-Rechte)
#   - psutil-Hardware-Sensoren (Container ohne /sys/class/hwmon)
#
# Fuer die nicht-abdeckbaren Pfade: scripts/hardware-test-linux.sh auf
# der Ziel-Hardware nach Deploy.

services:
  probe-test:
    build:
      context: .
      dockerfile: Dockerfile.linux-test
    image: humboldt-probe-test:linux
    volumes:
      # Repo eingebunden — aenderungen sind sofort sichtbar, kein
      # Container-Rebuild bei jedem Test.
      - .:/repo
    working_dir: /repo
    # tty + stdin damit pytest -v interactive wirkt; auch fuer
    # 'bash'-Drop-In sinnvoll.
    tty: true
    stdin_open: true
